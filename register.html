<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — GiftCard Rewards</title>
  <meta name="description" content="Create your free GiftCard Rewards account and start earning rewards">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="bg-animated"></div>
  
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="index.html" class="logo">GiftCard Rewards</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Back to Home</a>
      </div>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="container-narrow">
      <div class="glass-card auth-card">
        <div class="auth-header">
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Start claiming your gift card rewards today</p>
        </div>
        
        <div class="alert" id="register-alert"></div>
        
        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="full-name" placeholder="John Doe" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Create a strong password" 
                   required minlength="6">
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 6px;">
              Must be at least 6 characters
            </p>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="confirm-password" placeholder="Confirm your password" required>
          </div>
          
          <div style="margin-bottom: 24px;">
            <label style="display: flex; align-items: flex-start; gap: 10px; cursor: pointer; font-size: 14px; color: var(--text-secondary);">
              <input type="checkbox" id="terms" required style="width: 16px; height: 16px; margin-top: 2px;">
              <span>I agree to the <a href="#" style="color: #667eea;">Terms of Service</a> and <a href="#" style="color: #667eea;">Privacy Policy</a></span>
            </label>
          </div>
          
          <button type="submit" class="btn btn-primary w-full" id="register-btn">
            Create Account
          </button>
        </form>
        
        <p class="auth-link">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize Supabase
      app.initSupabase();
      
      // Check if already logged in
      const user = await app.getCurrentUser();
      if (user) {
        localStorage.setItem('giftcard_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
        return;
      }
      
      // Setup register form
      const registerForm = document.getElementById('register-form');
      const registerBtn = document.getElementById('register-btn');
      
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Get values
        const fullName = document.getElementById('full-name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        // Validate passwords match
        if (password !== confirmPassword) {
          app.showAlert('register-alert', 'Passwords do not match', 'error');
          return;
        }
        
        // Validate password length
        if (password.length < 6) {
          app.showAlert('register-alert', 'Password must be at least 6 characters', 'error');
          return;
        }
        
        registerBtn.dataset.originalText = registerBtn.textContent;
        app.setLoading(registerBtn, true);
        
        // Create account
        const result = await app.signUp(email, password, fullName);
        
        if (!result.success) {
          app.showAlert('register-alert', result.error, 'error');
          app.setLoading(registerBtn, false);
          return;
        }
        
        // Show success message
        app.showAlert('register-alert', 'Account created successfully! Redirecting...', 'success');
        
        // Wait for trigger to create user profile, then sign in
        setTimeout(async () => {
          const loginResult = await app.signIn(email, password);
          
          if (loginResult.success) {
            const user = await app.getCurrentUser();
            if (user) {
              localStorage.setItem('giftcard_user', JSON.stringify(user));
              window.location.href = 'dashboard.html';
            }
          } else {
            // If auto-login fails, redirect to login page
            window.location.href = 'login.html?registered=true';
          }
        }, 2000);
      });
    });
  </script>
</body>
</html>
