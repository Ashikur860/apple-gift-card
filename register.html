<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Apple Rewards</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <!-- Nav -->
  <nav class="nav">
    <div class="container nav-content">
      <a href="index.html" class="nav-logo">
        <img src="apple logggoo.png" alt="Apple" style="height: 28px; width: auto; margin-right: 8px;">
        Rewards
      </a>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="container-narrow">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo"><img src="apple logggoo.png" alt="Apple" style="height: 48px; width: auto;"></div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Start claiming your rewards today</p>
        </div>
        
        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="full-name" placeholder="John Doe" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Create a password" required minlength="6">
            <p style="font-size: 13px; color: var(--text-tertiary); margin-top: 6px;">Must be at least 6 characters</p>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="confirm-password" placeholder="Confirm your password" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-full" id="register-btn" style="margin-top: 8px;">
            Create Account
          </button>
        </form>
        
        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      app.initSupabase();
      
      // Check if already logged in
      const user = await app.getCurrentUser();
      if (user) {
        localStorage.setItem('giftcard_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
        return;
      }
      
      // Register form
      document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('full-name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm-password').value;
        
        // Validation
        if (password !== confirmPassword) {
          app.showToast('Passwords do not match', 'error');
          return;
        }
        
        if (password.length < 6) {
          app.showToast('Password must be at least 6 characters', 'error');
          return;
        }
        
        const btn = document.getElementById('register-btn');
        btn.dataset.originalText = btn.textContent;
        app.setLoading(btn, true);
        
        // Create account
        const result = await app.signUp(email, password, fullName);
        
        if (!result.success) {
          app.showToast(result.error, 'error');
          app.setLoading(btn, false);
          return;
        }
        
        app.showToast('Account created! Signing you in...', 'success');
        
        // Auto sign in
        setTimeout(async () => {
          const loginResult = await app.signIn(email, password);
          
          if (loginResult.success) {
            const user = await app.getCurrentUser();
            if (user) {
              localStorage.setItem('giftcard_user', JSON.stringify(user));
              window.location.href = 'dashboard.html';
            }
          } else {
            window.location.href = 'login.html';
          }
        }, 1500);
      });
    });
  </script>
</body>
</html>
