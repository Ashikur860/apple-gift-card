<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Apple Rewards</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <nav class="nav">
    <div class="container nav-content">
      <a href="index.html" class="nav-logo">
        <img src="apple logggoo.png" alt="Apple" style="height: 28px; width: auto; margin-right: 8px;">
        Rewards
      </a>
    </div>
  </nav>

  <div class="auth-page">
    <div class="container-narrow">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo"><img src="apple logggoo.png" alt="Apple" style="height: 48px; width: auto;"></div>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Start claiming your rewards today</p>
        </div>
        
        <form id="register-form">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-input" id="full-name" placeholder="John Doe" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Create a password" required minlength="6">
            <p style="font-size: 13px; color: var(--text-tertiary); margin-top: 6px;">Must be at least 6 characters</p>
          </div>
          
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-input" id="confirm-password" placeholder="Confirm your password" required>
          </div>
          
          <button type="button" class="btn btn-primary w-full" id="register-btn" style="margin-top: 8px;">
            Create Account
          </button>
        </form>
        
        <div class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    // Debug logging
    function debug(msg) {
      console.log('[REGISTER] ' + msg);
    }
    
    document.addEventListener('DOMContentLoaded', async function() {
      debug('DOM loaded');
      
      // Check if scripts loaded
      if (typeof CONFIG === 'undefined') {
        debug('ERROR: CONFIG not loaded');
        alert('Error: Config not loaded. Check config.js');
        return;
      }
      debug('CONFIG loaded: ' + CONFIG.SUPABASE_URL);
      
      if (typeof app === 'undefined') {
        debug('ERROR: app not loaded');
        alert('Error: App not loaded. Check app.js');
        return;
      }
      debug('app object found');
      
      // Initialize Supabase
      var client = app.initSupabase();
      if (!client) {
        debug('ERROR: Failed to initialize Supabase');
        alert('Failed to initialize Supabase. Check config.js');
        return;
      }
      debug('Supabase initialized');
      
      // Check if already logged in
      try {
        var currentUser = await app.getCurrentUser();
        if (currentUser) {
          debug('Already logged in, redirecting...');
          localStorage.setItem('giftcard_user', JSON.stringify(currentUser));
          window.location.href = 'dashboard.html';
          return;
        }
      } catch (e) {
        debug('Not logged in: ' + e.message);
      }
      
      // Register button click
      var registerBtn = document.getElementById('register-btn');
      debug('Register button found: ' + (registerBtn ? 'YES' : 'NO'));
      
      registerBtn.addEventListener('click', async function() {
        debug('Create Account button clicked');
        
        var fullName = document.getElementById('full-name').value.trim();
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var confirmPassword = document.getElementById('confirm-password').value;
        var btn = document.getElementById('register-btn');
        
        debug('Form values: ' + JSON.stringify({fullName, email, password: '***'}));
        
        // Validation
        if (!fullName || !email || !password) {
          alert('Please fill in all fields');
          return;
        }
        
        if (password !== confirmPassword) {
          alert('Passwords do not match');
          return;
        }
        
        if (password.length < 6) {
          alert('Password must be at least 6 characters');
          return;
        }
        
        // Show loading
        btn.disabled = true;
        btn.textContent = 'Creating Account...';
        debug('Calling app.signUp...');
        
        try {
          // Create account
          var result = await app.signUp(email, password, fullName);
          debug('signUp result: ' + JSON.stringify(result));
          
          if (!result.success) {
            alert('Registration failed: ' + (result.error || 'Unknown error'));
            btn.disabled = false;
            btn.textContent = 'Create Account';
            return;
          }
          
          // Success - auto login
          debug('Registration successful, logging in...');
          alert('Account created successfully!');
          
          var loginResult = await app.signIn(email, password);
          debug('signIn result: ' + JSON.stringify(loginResult));
          
          if (loginResult.success) {
            var user = await app.getCurrentUser();
            localStorage.setItem('giftcard_user', JSON.stringify(user));
            debug('Redirecting to dashboard...');
            window.location.href = 'dashboard.html';
          } else {
            debug('Login failed, redirecting to login page');
            window.location.href = 'login.html';
          }
        } catch (err) {
          debug('ERROR: ' + err.message);
          alert('Error: ' + err.message);
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });
      
      debug('Registration ready - waiting for button click');
    });
  </script>
</body>
</html>
