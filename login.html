<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Apple Rewards</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <!-- Nav -->
  <nav class="nav">
    <div class="container nav-content">
      <a href="index.html" class="nav-logo">
        <img src="apple logggoo.png" alt="Apple" style="height: 28px; width: auto; margin-right: 8px;">
        Rewards
      </a>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="container-narrow">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo"><img src="apple logggoo.png" alt="Apple" style="height: 48px; width: auto;"></div>
          <h1 class="auth-title">Sign In</h1>
          <p class="auth-subtitle">Access your rewards dashboard</p>
        </div>
        
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-full" id="login-btn" style="margin-top: 8px;">
            Sign In
          </button>
        </form>
        
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
        
        <div style="margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-primary); text-align: center;">
          <button class="btn btn-secondary w-full" id="admin-login-btn">
            Sign in as Admin
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Modal -->
  <div class="modal-overlay" id="admin-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeAdminModal()">×</button>
      <div class="modal-header">
        <h3 class="modal-title">Admin Access</h3>
        <p class="modal-subtitle">Enter admin credentials</p>
      </div>
      
      <form id="admin-form">
        <div class="form-group">
          <label class="form-label">Admin Email</label>
          <input type="email" class="form-input" id="admin-email" required>
        </div>
        
        <div class="form-group">
          <label class="form-label">Admin Password</label>
          <input type="password" class="form-input" id="admin-password" required>
        </div>
        
        <button type="submit" class="btn btn-primary w-full" style="margin-top: 8px;">
          Access Admin Panel
        </button>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      app.initSupabase();
      
      // Check if already logged in
      const user = await app.getCurrentUser();
      if (user) {
        localStorage.setItem('giftcard_user', JSON.stringify(user));
        if (user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'dashboard.html';
        }
        return;
      }
      
      // Login form
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('login-btn');
        btn.dataset.originalText = btn.textContent;
        app.setLoading(btn, true);
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        const result = await app.signIn(email, password);
        
        if (!result.success) {
          app.showToast(result.error, 'error');
          app.setLoading(btn, false);
          return;
        }
        
        const user = await app.getCurrentUser();
        if (user) {
          localStorage.setItem('giftcard_user', JSON.stringify(user));
          if (user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        }
      });
      
      // Admin login button
      document.getElementById('admin-login-btn').addEventListener('click', () => {
        document.getElementById('admin-modal').classList.add('active');
      });
      
      // Admin form
      document.getElementById('admin-form').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const email = document.getElementById('admin-email').value;
        const password = document.getElementById('admin-password').value;
        
        if (app.isAdmin(email, password)) {
          localStorage.setItem('is_admin', 'true');
          window.location.href = 'admin.html';
        } else {
          app.showToast('Invalid admin credentials', 'error');
        }
      });
    });
    
    function closeAdminModal() {
      document.getElementById('admin-modal').classList.remove('active');
    }
    
    window.closeAdminModal = closeAdminModal;
    
    // Close modal on overlay click
    window.onclick = function(event) {
      if (event.target.classList.contains('modal-overlay')) {
        event.target.classList.remove('active');
      }
    }
  </script>
</body>
</html>
