<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Apple Rewards</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <!-- Nav -->
  <nav class="nav">
    <div class="container nav-content">
      <a href="index.html" class="nav-logo">
        <img src="apple logggoo.png" alt="Apple" style="height: 28px; width: auto; margin-right: 8px;">
        Rewards
      </a>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="container-narrow">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo"><img src="apple logggoo.png" alt="Apple" style="height: 48px; width: auto;"></div>
          <h1 class="auth-title">Sign In</h1>
          <p class="auth-subtitle">Access your rewards dashboard</p>
        </div>
        
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
          </div>
          
          <button type="submit" class="btn btn-primary w-full" id="login-btn" style="margin-top: 8px;">
            Sign In
          </button>
        </form>
        
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Initialize Supabase
      const supabaseClient = app.initSupabase();
      if (!supabaseClient) {
        console.error('Failed to initialize Supabase');
        alert('Configuration error. Please check console.');
        return;
      }
      console.log('Supabase initialized successfully');
      
      // Check if already logged in
      try {
        const user = await app.getCurrentUser();
        if (user) {
          console.log('Already logged in:', user);
          localStorage.setItem('giftcard_user', JSON.stringify(user));
          if (user.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
          return;
        }
      } catch (err) {
        console.log('No existing session');
      }
      
      // Login form
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        console.log('Login form submitted');
        
        const btn = document.getElementById('login-btn');
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        console.log('Login attempt:', { email });
        
        if (!email || !password) {
          app.showToast('Please fill in all fields', 'error');
          return;
        }
        
        // Show loading
        btn.disabled = true;
        btn.textContent = 'Signing In...';
        
        try {
          const result = await app.signIn(email, password);
          console.log('SignIn result:', result);
          
          if (!result.success) {
            app.showToast(result.error || 'Login failed', 'error');
            btn.disabled = false;
            btn.textContent = 'Sign In';
            return;
          }
          
          const user = await app.getCurrentUser();
          console.log('Current user:', user);
          
          if (user) {
            localStorage.setItem('giftcard_user', JSON.stringify(user));
            if (user.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'dashboard.html';
            }
          }
        } catch (err) {
          console.error('Login error:', err);
          app.showToast('Login failed: ' + err.message, 'error');
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });
      
    });
    
    // Close modal on overlay click
    window.onclick = function(event) {
      if (event.target.classList.contains('modal-overlay')) {
        event.target.classList.remove('active');
      }
    }
  </script>
</body>
</html>
