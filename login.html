<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Apple Rewards</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="ambient-glow"></div>
  
  <nav class="nav">
    <div class="container nav-content">
      <a href="index.html" class="nav-logo">
        <img src="apple logggoo.png" alt="Apple" style="height: 28px; width: auto; margin-right: 8px;">
        Rewards
      </a>
      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">☰</button>
    </div>
  </nav>
  
  <!-- Mobile Navigation Menu -->
  <div class="mobile-nav-menu" id="mobile-nav-menu">
    <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close menu">✕</button>
    <a href="index.html" class="nav-link">Home</a>
    <a href="register.html" class="nav-link">Create Account</a>
    <a href="login.html" class="nav-link">Sign In</a>
  </div>

  <div class="auth-page">
    <div class="container-narrow">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-logo"><img src="apple logggoo.png" alt="Apple" style="height: 48px; width: auto;"></div>
          <h1 class="auth-title">Sign In</h1>
          <p class="auth-subtitle">Access your rewards dashboard</p>
        </div>
        
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-input" id="email" placeholder="name@example.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
          </div>
          
          <button type="button" class="btn btn-primary w-full" id="login-btn" style="margin-top: 8px;">
            Sign In
          </button>
        </form>
        
        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script>
    // Debug logging
    function debug(msg) {
      console.log('[LOGIN] ' + msg);
    }
    
    document.addEventListener('DOMContentLoaded', async function() {
      debug('DOM loaded');
      
      // Check if scripts loaded
      if (typeof CONFIG === 'undefined') {
        debug('ERROR: CONFIG not loaded');
        alert('Error: Config not loaded. Check config.js');
        return;
      }
      debug('CONFIG loaded: ' + CONFIG.SUPABASE_URL);
      
      if (typeof app === 'undefined') {
        debug('ERROR: app not loaded');
        alert('Error: App not loaded. Check app.js');
        return;
      }
      debug('app object found');
      
      // Initialize Supabase
      var client = app.initSupabase();
      if (!client) {
        debug('ERROR: Failed to initialize Supabase');
        alert('Failed to initialize Supabase. Check config.js');
        return;
      }
      debug('Supabase initialized');
      
      // Check if already logged in
      try {
        var currentUser = await app.getCurrentUser();
        if (currentUser) {
          debug('Already logged in, redirecting...');
          localStorage.setItem('giftcard_user', JSON.stringify(currentUser));
          if (currentUser.role === 'admin') {
            window.location.href = 'admin.html';
          } else {
            window.location.href = 'dashboard.html';
          }
          return;
        }
      } catch (e) {
        debug('Not logged in: ' + e.message);
      }
      
      // Login button click
      var loginBtn = document.getElementById('login-btn');
      debug('Login button found: ' + (loginBtn ? 'YES' : 'NO'));
      
      loginBtn.addEventListener('click', async function() {
        debug('Sign In button clicked');
        
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var btn = document.getElementById('login-btn');
        
        debug('Form values: ' + JSON.stringify({email, password: '***'}));
        
        if (!email || !password) {
          alert('Please fill in all fields');
          return;
        }
        
        // Show loading
        btn.disabled = true;
        btn.textContent = 'Signing In...';
        debug('Calling app.signIn...');
        
        try {
          var result = await app.signIn(email, password);
          debug('signIn result: ' + JSON.stringify(result));
          
          if (!result.success) {
            alert('Login failed: ' + (result.error || 'Invalid credentials'));
            btn.disabled = false;
            btn.textContent = 'Sign In';
            return;
          }
          
          var user = await app.getCurrentUser();
          debug('User retrieved: ' + (user ? user.email : 'null'));
          
          if (user) {
            localStorage.setItem('giftcard_user', JSON.stringify(user));
            debug('Redirecting to dashboard...');
            if (user.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'dashboard.html';
            }
          }
        } catch (err) {
          debug('ERROR: ' + err.message);
          alert('Error: ' + err.message);
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });
      
      debug('Login ready - waiting for button click');
    });
    
    // Mobile Menu Toggle
    const menuBtn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-nav-menu');
    const closeBtn = document.getElementById('mobile-nav-close');
    
    if (menuBtn && menu && closeBtn) {
      menuBtn.addEventListener('click', () => {
        menu.classList.add('active');
        document.body.style.overflow = 'hidden';
      });
      
      closeBtn.addEventListener('click', () => {
        menu.classList.remove('active');
        document.body.style.overflow = '';
      });
      
      menu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          menu.classList.remove('active');
          document.body.style.overflow = '';
        });
      });
    }
  </script>
</body>
</html>
